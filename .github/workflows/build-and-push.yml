name: Build and Push Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: ljmerza/misc-actions/.github/workflows/python-tests.yml@v2
    with:
      python-version: "3.11"
      coverage-source: "frigate_plate_recognizer"

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        uses: ljmerza/misc-actions/actions/docker-build-push@v2
        with:
          image-name: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}
          registry: docker.io
          registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
          registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
